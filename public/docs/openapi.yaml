openapi: 3.0.3
info:
  title: 'Ban Chim Bồ Câu — API Documentation'
  description: 'Backend API cho hệ thống bán gia cầm & thú nuôi. Hỗ trợ quản lý sản phẩm, tồn kho, đơn hàng.'
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1:8000'
tags:
  -
    name: Auth
    description: "\nXác thực admin (Sanctum token)"
  -
    name: 'Admin > Dashboard'
    description: "\nTong quan don hang cho admin"
  -
    name: 'Admin > Đơn hàng'
    description: "\nQuản lý đơn hàng (yêu cầu đăng nhập admin)"
  -
    name: 'Admin > Sản phẩm'
    description: "\nCRUD sản phẩm và toggle trạng thái active"
  -
    name: 'Admin > Danh mục'
    description: "\nQuản lý danh mục sản phẩm (max 2 cấp)"
  -
    name: 'Admin > Tồn kho'
    description: "\nĐiều chỉnh tồn kho và xem lịch sử thay đổi"
  -
    name: 'Admin > Ảnh sản phẩm'
    description: "\nUpload, đặt ảnh chính, xóa ảnh sản phẩm (lưu trên S3)"
  -
    name: 'Public > Sản phẩm'
    description: "\nXem danh sách và chi tiết sản phẩm (không cần đăng nhập)"
  -
    name: 'Public > Giỏ hàng'
    description: "\nQuản lý giỏ hàng khách (không cần đăng nhập)"
  -
    name: 'Public > Checkout'
    description: "\nĐặt hàng từ giỏ hàng (không cần đăng nhập)"
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Gửi `POST /api/v1/admin/login` với `email` và `password` để nhận token. Thêm header `Authorization: Bearer {token}` cho các admin endpoint. Public endpoint không cần token.'
security:
  -
    default: []
paths:
  /api/v1/admin/login:
    post:
      summary: 'Đăng nhập admin'
      operationId: ngNhpAdmin
      description: "Trả về Sanctum token để sử dụng cho các admin endpoint.\nThêm header `Authorization: Bearer {token}` cho tất cả admin request."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    token: 1|abc123xyz...
                    expires_at: '2026-04-28T00:00:00.000000Z'
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|abc123xyz...
                      expires_at:
                        type: string
                        example: '2026-04-28T00:00:00.000000Z'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Email hoặc mật khẩu không đúng.'
                  errors:
                    email:
                      - 'Email hoặc mật khẩu không đúng.'
                properties:
                  message:
                    type: string
                    example: 'Email hoặc mật khẩu không đúng.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'Email hoặc mật khẩu không đúng.'
                        items:
                          type: string
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email admin.'
                  example: admin@example.com
                password:
                  type: string
                  description: 'Mật khẩu.'
                  example: password
              required:
                - email
                - password
      security: []
  /api/v1/admin/logout:
    post:
      summary: 'Đăng xuất admin'
      operationId: ngXutAdmin
      description: 'Thu hồi Sanctum token hiện tại. Token sẽ không còn hợp lệ sau khi đăng xuất.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Đã đăng xuất thành công.'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Đã đăng xuất thành công.'
      tags:
        - Auth
  /api/v1/admin/dashboard:
    get:
      summary: 'Dashboard tong quan don hang'
      operationId: dashboardTongQuanDonHang
      description: 'Tra ve so don hang theo tung trang thai.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    orders_by_status:
                      cho_xac_nhan: 5
                      xac_nhan: 3
                      dang_giao: 2
                      hoan_thanh: 10
                      huy: 1
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      orders_by_status:
                        type: object
                        properties:
                          cho_xac_nhan:
                            type: integer
                            example: 5
                          xac_nhan:
                            type: integer
                            example: 3
                          dang_giao:
                            type: integer
                            example: 2
                          hoan_thanh:
                            type: integer
                            example: 10
                          huy:
                            type: integer
                            example: 1
      tags:
        - 'Admin > Dashboard'
  /api/v1/admin/orders:
    get:
      summary: 'Danh sach don hang (filter/search/pagination)'
      operationId: danhSachDonHangfiltersearchpagination
      description: "Loc theo trang thai, khoang ngay, tim theo ten/SDT khach.\nMac dinh: sap xep theo ngay tao giam dan (don moi nhat truoc), 20 ban ghi/trang."
      parameters:
        -
          in: query
          name: 'filter[status]'
          description: 'Loc theo trang thai: cho_xac_nhan, xac_nhan, dang_giao, hoan_thanh, huy.'
          example: cho_xac_nhan
          required: false
          schema:
            type: string
            description: 'Loc theo trang thai: cho_xac_nhan, xac_nhan, dang_giao, hoan_thanh, huy.'
            example: cho_xac_nhan
        -
          in: query
          name: 'filter[search]'
          description: 'Tim theo ten hoac SDT khach.'
          example: Nguyen
          required: false
          schema:
            type: string
            description: 'Tim theo ten hoac SDT khach.'
            example: Nguyen
        -
          in: query
          name: 'filter[date_from]'
          description: 'Loc tu ngay (YYYY-MM-DD).'
          example: '2026-01-01'
          required: false
          schema:
            type: string
            description: 'Loc tu ngay (YYYY-MM-DD).'
            example: '2026-01-01'
        -
          in: query
          name: 'filter[date_to]'
          description: 'Loc den ngay (YYYY-MM-DD).'
          example: '2026-12-31'
          required: false
          schema:
            type: string
            description: 'Loc den ngay (YYYY-MM-DD).'
            example: '2026-12-31'
        -
          in: query
          name: sort
          description: 'Sap xep: created_at hoac -created_at.'
          example: '-created_at'
          required: false
          schema:
            type: string
            description: 'Sap xep: created_at hoac -created_at.'
            example: '-created_at'
        -
          in: query
          name: page
          description: Trang.
          example: 1
          required: false
          schema:
            type: integer
            description: Trang.
            example: 1
        -
          in: query
          name: per_page
          description: 'So ban ghi moi trang (mac dinh 20).'
          example: 20
          required: false
          schema:
            type: integer
            description: 'So ban ghi moi trang (mac dinh 20).'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    -
                      id: 1
                      customer_name: 'Nguyen Van A'
                      order_status: cho_xac_nhan
                  meta:
                    current_page: 1
                    last_page: 1
                    per_page: 20
                    total: 1
                  links:
                    first: ...
                    last: ...
                    prev: null
                    next: null
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        customer_name: 'Nguyen Van A'
                        order_status: cho_xac_nhan
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        customer_name:
                          type: string
                          example: 'Nguyen Van A'
                        order_status:
                          type: string
                          example: cho_xac_nhan
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 20
                      total:
                        type: integer
                        example: 1
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: ...
                      last:
                        type: string
                        example: ...
                      prev:
                        type: string
                        example: null
                        nullable: true
                      next:
                        type: string
                        example: null
                        nullable: true
      tags:
        - 'Admin > Đơn hàng'
    post:
      summary: 'Create a manual order (admin)'
      operationId: createAManualOrderadmin
      description: "Admin nhập đơn hàng thủ công cho khách Zalo/điện thoại.\nDùng cùng cơ chế lock atomic như checkout khách hàng."
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 2
                    customer_name: 'Trần Thị B'
                    order_status: cho_xac_nhan
                    payment_status: chua_thanh_toan
                    created_by: 1
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 2
                      customer_name:
                        type: string
                        example: 'Trần Thị B'
                      order_status:
                        type: string
                        example: cho_xac_nhan
                      payment_status:
                        type: string
                        example: chua_thanh_toan
                      created_by:
                        type: integer
                        example: 1
      tags:
        - 'Admin > Đơn hàng'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_name:
                  type: string
                  description: 'Họ tên khách hàng.'
                  example: 'Trần Thị B'
                customer_phone:
                  type: string
                  description: 'Số điện thoại 10 chữ số bắt đầu 0.'
                  example: '0909876543'
                delivery_address:
                  type: string
                  description: 'Địa chỉ giao hàng.'
                  example: '456 Đường XYZ, Hà Nội'
                payment_method:
                  type: string
                  description: 'Phương thức thanh toán: cod hoặc chuyen_khoan.'
                  example: cod
                items:
                  type: array
                  description: 'Danh sách sản phẩm.'
                  example:
                    - architecto
                  items:
                    type: string
              required:
                - customer_name
                - customer_phone
                - delivery_address
                - payment_method
                - items
  '/api/v1/admin/orders/{id}':
    get:
      summary: 'Get order detail (admin)'
      operationId: getOrderDetailadmin
      description: 'Xem chi tiết đơn hàng theo ID.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    customer_name: 'Nguyễn Văn A'
                    order_status: cho_xac_nhan
                    items: []
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      customer_name:
                        type: string
                        example: 'Nguyễn Văn A'
                      order_status:
                        type: string
                        example: cho_xac_nhan
                      items:
                        type: array
                        example: []
      tags:
        - 'Admin > Đơn hàng'
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the order.'
        example: architecto
        required: true
        schema:
          type: string
  '/api/v1/admin/orders/{order}/status':
    patch:
      summary: 'Update order status (admin)'
      operationId: updateOrderStatusadmin
      description: "Chuyển trạng thái đơn hàng theo state machine hợp lệ.\nKhông dùng endpoint này để hủy đơn — dùng POST /orders/{order}/cancel."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    order_status: xac_nhan
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      order_status:
                        type: string
                        example: xac_nhan
      tags:
        - 'Admin > Đơn hàng'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: 'Trạng thái mới: cho_xac_nhan, xac_nhan, dang_giao, hoặc hoan_thanh.'
                  example: xac_nhan
              required:
                - status
    parameters:
      -
        in: path
        name: order
        description: 'The order.'
        example: architecto
        required: true
        schema:
          type: string
  '/api/v1/admin/orders/{order}/cancel':
    post:
      summary: 'Cancel order (admin)'
      operationId: cancelOrderadmin
      description: "Hủy đơn hàng và hoàn lại tồn kho trong cùng một transaction.\nKhông thể hủy đơn đã hoàn thành (hoan_thanh)."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Don hang da duoc huy.'
                  data:
                    id: 1
                    order_status: huy
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Don hang da duoc huy.'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      order_status:
                        type: string
                        example: huy
      tags:
        - 'Admin > Đơn hàng'
    parameters:
      -
        in: path
        name: order
        description: 'The order.'
        example: architecto
        required: true
        schema:
          type: string
  '/api/v1/admin/orders/{order}/payment-status':
    patch:
      summary: 'Confirm payment (admin)'
      operationId: confirmPaymentadmin
      description: "Xác nhận thanh toán đơn hàng (payment_status -> da_thanh_toan).\nIdempotent: gọi nhiều lần vẫn trả về 200 với da_thanh_toan."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Da xac nhan thanh toan.'
                  data:
                    id: 1
                    payment_status: da_thanh_toan
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Da xac nhan thanh toan.'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      payment_status:
                        type: string
                        example: da_thanh_toan
      tags:
        - 'Admin > Đơn hàng'
    parameters:
      -
        in: path
        name: order
        description: 'The order.'
        example: architecto
        required: true
        schema:
          type: string
  '/api/v1/admin/orders/{order}/delivery-method':
    patch:
      summary: 'Set delivery method (admin)'
      operationId: setDeliveryMethodadmin
      description: 'Gán hình thức giao hàng cho đơn: noi_tinh (tự giao) hoặc ngoai_tinh (xe khách).'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    delivery_method: noi_tinh
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      delivery_method:
                        type: string
                        example: noi_tinh
      tags:
        - 'Admin > Đơn hàng'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                delivery_method:
                  type: string
                  description: 'Hình thức giao hàng: noi_tinh hoặc ngoai_tinh.'
                  example: noi_tinh
              required:
                - delivery_method
    parameters:
      -
        in: path
        name: order
        description: 'The order.'
        example: architecto
        required: true
        schema:
          type: string
  /api/v1/admin/products:
    get:
      summary: 'Danh sách sản phẩm (admin)'
      operationId: danhSchSnPhmadmin
      description: 'Trả về danh sách tất cả sản phẩm có phân trang, bao gồm sản phẩm không active.'
      parameters:
        -
          in: query
          name: page
          description: 'Số trang.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Số trang.'
            example: 1
        -
          in: query
          name: per_page
          description: 'Số sản phẩm mỗi trang (mặc định 20).'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Số sản phẩm mỗi trang (mặc định 20).'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      name: 'Bồ câu sống'
                      price_vnd: 85000
                      unit_type: con
                      stock_quantity: '50.000'
                      is_active: true
                  links:
                    first: ...
                    last: ...
                    prev: null
                    next: null
                  meta:
                    current_page: 1
                    last_page: 1
                    per_page: 20
                    total: 1
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: 'Bồ câu sống'
                        price_vnd: 85000
                        unit_type: con
                        stock_quantity: '50.000'
                        is_active: true
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: 'Bồ câu sống'
                        price_vnd:
                          type: integer
                          example: 85000
                        unit_type:
                          type: string
                          example: con
                        stock_quantity:
                          type: string
                          example: '50.000'
                        is_active:
                          type: boolean
                          example: true
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: ...
                      last:
                        type: string
                        example: ...
                      prev:
                        type: string
                        example: null
                        nullable: true
                      next:
                        type: string
                        example: null
                        nullable: true
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 20
                      total:
                        type: integer
                        example: 1
      tags:
        - 'Admin > Sản phẩm'
    post:
      summary: 'Tạo sản phẩm mới'
      operationId: toSnPhmMi
      description: 'Tạo sản phẩm với thông tin cơ bản và tồn kho ban đầu.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    name: 'Bồ câu sống'
                    price_vnd: 85000
                    unit_type: con
                    stock_quantity: '50.000'
                    is_active: true
                    category:
                      id: 1
                      name: 'Chim bồ câu'
                    images: []
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Bồ câu sống'
                      price_vnd:
                        type: integer
                        example: 85000
                      unit_type:
                        type: string
                        example: con
                      stock_quantity:
                        type: string
                        example: '50.000'
                      is_active:
                        type: boolean
                        example: true
                      category:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Chim bồ câu'
                      images:
                        type: array
                        example: []
      tags:
        - 'Admin > Sản phẩm'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Tên sản phẩm.'
                  example: 'Bồ câu sống'
                description:
                  type: string
                  description: 'optional Mô tả sản phẩm.'
                  example: 'Bồ câu ta nuôi tự nhiên, bán theo cặp hoặc lẻ'
                price_vnd:
                  type: integer
                  description: 'Giá bán (VNĐ).'
                  example: 85000
                unit_type:
                  type: string
                  description: 'Đơn vị bán: con hoặc kg.'
                  example: con
                category_id:
                  type: integer
                  description: 'ID danh mục.'
                  example: 1
                stock_quantity:
                  type: numeric
                  description: 'optional Tồn kho ban đầu (mặc định 0).'
                  example: '50'
                is_active:
                  type: boolean
                  description: 'optional Trạng thái hiển thị (mặc định true).'
                  example: true
              required:
                - name
                - price_vnd
                - unit_type
                - category_id
  '/api/v1/admin/products/{id}':
    get:
      summary: 'Chi tiết sản phẩm (admin)'
      operationId: chiTitSnPhmadmin
      description: 'Trả về thông tin đầy đủ của sản phẩm bao gồm tất cả ảnh và thông tin tồn kho.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    name: 'Bồ câu sống'
                    description: 'Bồ câu ta nuôi tự nhiên'
                    price_vnd: 85000
                    unit_type: con
                    stock_quantity: '50.000'
                    is_active: true
                    category:
                      id: 1
